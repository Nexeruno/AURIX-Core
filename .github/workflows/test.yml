name: 🧪 Build & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build application
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      - name: ✅ Verify artifacts
        run: |
          echo "🔍 Checking build artifacts..."

          if [ ! -f "docs/index.html" ]; then
            echo "❌ FAIL: docs/index.html not found"
            exit 1
          fi

          if [ ! -d "docs/assets" ]; then
            echo "❌ FAIL: docs/assets directory not found"
            exit 1
          fi

          JS_FILES=$(find docs/assets -name "*.js" | wc -l)
          CSS_FILES=$(find docs/assets -name "*.css" | wc -l)

          if [ "$JS_FILES" -eq 0 ]; then
            echo "❌ FAIL: No JS files in assets"
            exit 1
          fi

          if [ "$CSS_FILES" -eq 0 ]; then
            echo "❌ FAIL: No CSS files in assets"
            exit 1
          fi

          echo "✅ Build artifacts verified"
          echo "   - index.html: OK"
          echo "   - JS files: $JS_FILES"
          echo "   - CSS files: $CSS_FILES"

      - name: 📊 Check bundle size
        run: |
          echo "📊 Bundle Analysis:"
          du -sh docs/
          du -sh docs/assets/

          BUNDLE_SIZE=$(du -s docs/assets/index-*.js | awk '{print $1}')
          echo "Main bundle: $BUNDLE_SIZE"

          if [ "$BUNDLE_SIZE" -gt 2000000 ]; then
            echo "⚠️ WARNING: Bundle size > 2MB"
          else
            echo "✅ Bundle size OK"
          fi

      - name: 🔐 Security check
        run: |
          echo "🔐 Security checks:"

          # Check for console.log in production code
          if grep -r "console\\.log" src/ --include="*.jsx" --include="*.js" 2>/dev/null | grep -v "test"; then
            echo "⚠️ WARNING: console.log found in source"
          fi

          # Check for hardcoded secrets
          if grep -r "password\|secret\|token" src/ --include="*.jsx" --include="*.js" | grep -v "//"; then
            echo "⚠️ WARNING: Potential hardcoded secret"
          fi

          echo "✅ Security check completed"

      - name: ✨ Build Success
        if: success()
        run: |
          echo "✅ Build successful!"
          echo "   Next step: Deploy to GitHub Pages"
          echo "   Once merged to main, CI/CD will automatically deploy"
