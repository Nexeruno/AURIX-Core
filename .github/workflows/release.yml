name: 🏷️ Semantic Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/workflows/**'
      - 'test-*.js'
      - '*.png'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "Last tag: $LAST_TAG"

      - name: 🧮 Determine version bump
        id: version
        run: |
          LAST_TAG=${{ steps.last_tag.outputs.tag }}
          # Parse version (v2024.05.30.143000)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          TIME=$(date +%H%M%S)

          NEW_VERSION="v${YEAR}.${MONTH}.${DAY}.${TIME}"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ New version: $NEW_VERSION"

      - name: 🏷️ Create and push tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get commit message for release notes
          COMMIT_MSG=$(git log -1 --pretty=%B)

          git tag -a "$VERSION" -m "Release: $COMMIT_MSG"
          git push origin "$VERSION"
          echo "✅ Tagged: $VERSION"

      - name: 📝 Create Release Notes
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Deployment Info
            - **Version**: ${{ steps.version.outputs.version }}
            - **Commit**: ${{ github.sha }}
            - **Build**: ${{ github.run_number }}
            - **Deploy Time**: $(date)

            ## What's Deployed
            - ✅ Admin Panel (Delete, Block, Edit users)
            - ✅ Login Tracking (lastLogin, loginCount)
            - ✅ Cloud Functions (4 functions)
            - ✅ Firebase Integration
            - ✅ Responsive Design

            ## Access
            - 🌐 **Live**: https://nexeruno.github.io/Evidence-v-daj-/
            - 📦 **Code**: https://github.com/${{ github.repository }}
            - ⚙️ **Fallback**: Check `gh-pages-backup` branch

            Deploy commit: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
