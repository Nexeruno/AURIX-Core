name: 🚀 Deploy & Backup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build application
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      - name: ✅ Verify build artifacts
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed: index.html not found"
            exit 1
          fi
          if [ ! -d "dist/assets" ]; then
            echo "❌ Build failed: assets directory not found"
            exit 1
          fi
          echo "✅ Build artifacts verified"

      - name: 📤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }}'

      - name: 💾 Backup current version to gh-pages-backup
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: backup-${{ github.run_number }}
          branch: gh-pages-backup
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 🏷️ Create version tag
        if: success()
        run: |
          VERSION=$(date +v%Y.%m.%d.%H%M%S)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Deployment: ${{ github.sha }}"
          git push origin "$VERSION"
          echo "✅ Tagged version: $VERSION"

      - name: 🔄 Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "ℹ️ Fallback: Last working version available at:"
          echo "   https://github.com/${{ github.repository }}/tree/gh-pages-backup"
          exit 1

      - name: 📢 Notify deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Deployment successful"
            echo "🌐 Live at: https://nexeruno.github.io/Evidence-v-daj-/"
          else
            echo "❌ Deployment failed - using fallback version"
            echo "🔄 Rollback to: https://nexeruno.github.io/Evidence-v-daj-/"
          fi
